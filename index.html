<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D小球躲避游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a1a;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        #canvas {
            display: block;
        }
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .score-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #333;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            background: rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 10px;
        }

        .score-label {
            font-size: 14px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .score-value {
            font-size: 48px;
            font-weight: bold;
            color: #ff9900;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .speed-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #333;
            font-size: 16px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            background: rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
        }
        .screen {
            background: rgba(10, 10, 26, 0.95);
            padding: 60px 80px;
            border-radius: 20px;
            text-align: center;
            pointer-events: auto;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 50px rgba(255, 204, 0, 0.2);
        }
        .screen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffcc00, #ff6600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .screen p {
            color: #aaa;
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .final-score {
            font-size: 36px;
            color: #ffcc00;
            margin: 20px 0;
        }
        .btn {
            background: linear-gradient(135deg, #ffcc00, #ff9900);
            color: #0a0a1a;
            border: none;
            padding: 15px 50px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.6);
        }
        .controls-info {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .controls-info h3 {
            color: #ffcc00;
            margin-bottom: 10px;
        }
        .controls-info span {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 5px;
            margin: 5px;
            color: #fff;
        }
        .legend {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            color: #333;
            font-size: 14px;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.3);
            padding: 10px 25px;
            border-radius: 10px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }
        .legend-dot.red { background: #ff4444; box-shadow: 0 0 10px #ff4444; }
        .legend-dot.white { background: #ffffff; box-shadow: 0 0 10px #ffffff; }
        .legend-dot.green { background: #44ff44; box-shadow: 0 0 10px #44ff44; }
        .legend-dot.yellow { background: #ffcc00; box-shadow: 0 0 10px #ffcc00; }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas"></canvas>
        
        <div class="score-panel" id="scorePanel">
            <div class="score-label">得分</div>
            <div class="score-value" id="scoreValue">0</div>
        </div>

        <div class="speed-indicator" id="speedIndicator">
            速度: 正常
        </div>

        <div class="legend" id="legend">
            <div class="legend-item">
                <div class="legend-dot yellow"></div>
                <span>你</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot red"></div>
                <span>致命</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot white"></div>
                <span>减速</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot green"></div>
                <span>得分</span>
            </div>
        </div>

        <div class="ui-overlay" id="startScreen">
            <div class="screen">
                <h1>🎮 3D小球躲避游戏</h1>
                <p>操控黄色小球躲避障碍物！<br>收集绿色小球得分，避开红色小球，小心白色小球会让你减速！</p>
                <button class="btn" id="startBtn">开始游戏</button>
                <div class="controls-info">
                    <h3>控制方式</h3>
                    <span>W</span>
                    <span>A</span>
                    <span>S</span>
                    <span>D</span>
                    <span>或</span>
                    <span>↑</span>
                    <span>←</span>
                    <span>↓</span>
                    <span>→</span>
                </div>
            </div>
        </div>

        <div class="ui-overlay hidden" id="gameOverScreen">
            <div class="screen">
                <h1>💥 游戏结束</h1>
                <div class="final-score">最终得分: <span id="finalScore">0</span></div>
                <button class="btn" id="restartBtn">再来一局</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const GameState = {
            START: 'start',
            PLAYING: 'playing',
            GAME_OVER: 'gameover'
        };

        let currentState = GameState.START;
        let score = 0;
        let playerSpeed = 0.45;
        let normalSpeed = 0.45;
        let slowdownTimer = 0;
        let lastTime = 0;

        let scene, camera, renderer;
        let player;
        let obstacles = [];
        let staticObstacles = [];
        let boundaryObstacles = [];
        let clouds = [];
        let keys = {};

        const canvas = document.getElementById('canvas');
        const scoreValue = document.getElementById('scoreValue');
        const speedIndicator = document.getElementById('speedIndicator');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const scorePanel = document.getElementById('scorePanel');
        const legend = document.getElementById('legend');
        const finalScoreEl = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
            camera.position.set(0, 30, 35);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(10, 20, 10);
            scene.add(directionalLight);

            const pointLight1 = new THREE.PointLight(0xffcc00, 0.5, 100);
            pointLight1.position.set(10, 10, 10);
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight(0x00ccff, 0.4, 100);
            pointLight2.position.set(-10, 5, -10);
            scene.add(pointLight2);

            createClouds();
            createGround();
            createPlayer();

            window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
            window.addEventListener('resize', onWindowResize);
            startBtn.addEventListener('click', startGame);
            restartBtn.addEventListener('click', startGame);

            animate();
        }

        function createClouds() {
            const cloudCount = 15;
            for (let i = 0; i < cloudCount; i++) {
                const cloudGroup = new THREE.Group();
                
                for (let j = 0; j < 4 + Math.random() * 4; j++) {
                    const geometry = new THREE.SphereGeometry(3 + Math.random() * 3, 6, 6);
                    const material = new THREE.MeshPhongMaterial({
                        color: 0xffffff,
                        transparent: true,
                        opacity: 0.7
                    });
                    const cloudPart = new THREE.Mesh(geometry, material);
                    cloudPart.position.set(
                        (Math.random() - 0.5) * 12,
                        (Math.random() - 0.5) * 3,
                        (Math.random() - 0.5) * 6
                    );
                    cloudPart.scale.set(1, 0.6, 1);
                    cloudGroup.add(cloudPart);
                }
                
                cloudGroup.position.set(
                    (Math.random() - 0.5) * 250,
                    50 + Math.random() * 40,
                    (Math.random() - 0.5) * 250
                );
                cloudGroup.userData.speed = 0.008 + Math.random() * 0.012;
                scene.add(cloudGroup);
                clouds.push(cloudGroup);
            }
        }

        function createGround() {
            const groundGeometry = new THREE.PlaneGeometry(200, 200);
            const groundMaterial = new THREE.MeshPhongMaterial({
                color: 0x4169E1,
                shininess: 10
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -2;
            scene.add(ground);

            createStaticObstacles();
        }

        function createStaticObstacles() {
            const obstacleTypes = ['tree', 'rock'];
            
            for (let i = 0; i < 20; i++) {
                const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
                let obstacle, radius;
                
                if (type === 'tree') {
                    const treeGroup = new THREE.Group();
                    const trunkGeo = new THREE.CylinderGeometry(0.3, 0.5, 3, 6);
                    const trunkMat = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
                    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                    trunk.position.y = 0.5;
                    treeGroup.add(trunk);
                    
                    const leavesGeo = new THREE.SphereGeometry(1.5, 6, 6);
                    const leavesMat = new THREE.MeshPhongMaterial({ color: 0x228B22 });
                    const leaves = new THREE.Mesh(leavesGeo, leavesMat);
                    leaves.position.y = 3;
                    treeGroup.add(leaves);
                    
                    obstacle = treeGroup;
                    radius = 1.5;
                } else if (type === 'rock') {
                    const size = 1 + Math.random() * 1.5;
                    const rockGeo = new THREE.DodecahedronGeometry(size, 0);
                    const rockMat = new THREE.MeshPhongMaterial({ color: 0x808080 });
                    obstacle = new THREE.Mesh(rockGeo, rockMat);
                    radius = size * 1.1;
                } else {
                    const buildingGroup = new THREE.Group();
                    const width = 2 + Math.random() * 3;
                    const height = 3 + Math.random() * 4;
                    const depth = 2 + Math.random() * 3;
                    
                    const buildingGeo = new THREE.BoxGeometry(width, height, depth);
                    const buildingMat = new THREE.MeshPhongMaterial({ color: 0x708090 });
                    const building = new THREE.Mesh(buildingGeo, buildingMat);
                    building.position.y = height / 2 - 1;
                    buildingGroup.add(building);
                    
                    for (let wy = 0; wy < Math.floor(height / 1.5); wy++) {
                        for (let wx = 0; wx < Math.floor(width / 1.5); wx++) {
                            const windowGeo = new THREE.PlaneGeometry(0.5, 0.6);
                            const windowMat = new THREE.MeshPhongMaterial({ 
                                color: 0xFFFF00, 
                                emissive: 0xFFFF00,
                                emissiveIntensity: 0.3
                            });
                            const windowMesh = new THREE.Mesh(windowGeo, windowMat);
                            windowMesh.position.set(-width/2 + 0.8 + wx * 1.5, -1 + wy * 1.5 + 1, depth/2 + 0.01);
                            buildingGroup.add(windowMesh);
                        }
                    }
                    
                    const doorGeo = new THREE.PlaneGeometry(0.8, 1.2);
                    const doorMat = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
                    const door = new THREE.Mesh(doorGeo, doorMat);
                    door.position.set(0, -0.5, depth/2 + 0.01);
                    buildingGroup.add(door);
                    
                    obstacle = buildingGroup;
                    radius = Math.max(width, depth) * 0.6;
                }
                
                let x, z;
                do {
                    x = (Math.random() - 0.5) * 160;
                    z = (Math.random() - 0.5) * 160;
                } while (Math.sqrt(x * x + z * z) < 15);
                
                obstacle.position.set(x, 0, z);
                obstacle.userData.radius = radius;
                obstacle.userData.originalOpacity = 1;
                obstacle.userData.isTransparent = false;
                scene.add(obstacle);
                staticObstacles.push(obstacle);
            }
            
            createBoundaryObstacles();
        }
        
        function createBoundaryObstacles() {
            const boundarySize = 90;
            
            for (let side = 0; side < 4; side++) {
                for (let i = 0; i < 12; i++) {
                    let x, z;
                    let obstacle, radius;
                    
                    if (side === 3) {
                        x = -boundarySize + Math.random() * 5;
                        z = -boundarySize + (i / 12) * boundarySize * 2;
                        
                        const waterSize = 25 + Math.random() * 20;
                        const waterGeo = new THREE.CylinderGeometry(waterSize, waterSize, 0.5, 16);
                        const waterMat = new THREE.MeshPhongMaterial({ 
                            color: 0x1E90FF, 
                            transparent: true,
                            opacity: 0.8
                        });
                        obstacle = new THREE.Mesh(waterGeo, waterMat);
                        obstacle.position.y = -1.8;
                        radius = waterSize * 0.9;
                    } else {
                        if (side === 0) {
                            x = -boundarySize + (i / 12) * boundarySize * 2;
                            z = boundarySize - Math.random() * 5;
                        } else if (side === 1) {
                            x = boundarySize - Math.random() * 5;
                            z = -boundarySize + (i / 12) * boundarySize * 2;
                        } else {
                            x = -boundarySize + (i / 12) * boundarySize * 2;
                            z = -boundarySize + Math.random() * 5;
                        }
                        
                        const type = Math.floor(Math.random() * 2);
                        
                        if (type === 0) {
                            const mountainSize = 4 + Math.random() * 5;
                            const mountainGeo = new THREE.ConeGeometry(mountainSize, mountainSize * 1.3, 6);
                            const mountainMat = new THREE.MeshPhongMaterial({ color: 0x556B2F });
                            obstacle = new THREE.Mesh(mountainGeo, mountainMat);
                            obstacle.position.y = mountainSize * 0.65 - 1;
                            radius = mountainSize * 0.7;
                        } else {
                            const treeGroup = new THREE.Group();
                            const trunkGeo = new THREE.CylinderGeometry(0.4, 0.6, 4, 5);
                            const trunkMat = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
                            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                            trunk.position.y = 0.6;
                            treeGroup.add(trunk);
                            
                            const leavesGeo = new THREE.SphereGeometry(2, 5, 5);
                            const leavesMat = new THREE.MeshPhongMaterial({ color: 0x228B22 });
                            const leaves = new THREE.Mesh(leavesGeo, leavesMat);
                            leaves.position.y = 3.5;
                            treeGroup.add(leaves);
                            
                            obstacle = treeGroup;
                            radius = 2;
                        }
                    }
                    
                    obstacle.position.set(x, 0, z);
                    obstacle.userData.radius = radius;
                    obstacle.userData.originalOpacity = 1;
                    obstacle.userData.isTransparent = false;
                    obstacle.userData.isBoundary = true;
                    scene.add(obstacle);
                    boundaryObstacles.push(obstacle);
                }
            }
        }

        function createPlayer() {
            const geometry = new THREE.SphereGeometry(1, 32, 32);
            const material = new THREE.MeshPhongMaterial({
                color: 0xffcc00,
                emissive: 0xffcc00,
                emissiveIntensity: 0.3,
                shininess: 100
            });
            player = new THREE.Mesh(geometry, material);
            player.position.set(0, 0, 0);
            scene.add(player);
        }

        function createObstacle() {
            const types = ['red', 'white', 'green'];
            const weights = [0.4, 0.3, 0.3];
            let type;
            const rand = Math.random();
            let cumulative = 0;
            for (let i = 0; i < types.length; i++) {
                cumulative += weights[i];
                if (rand < cumulative) {
                    type = types[i];
                    break;
                }
            }

            const colors = {
                red: 0xff4444,
                white: 0xffffff,
                green: 0x44ff44
            };

            const geometry = new THREE.SphereGeometry(0.7, 16, 16);
            const material = new THREE.MeshPhongMaterial({
                color: colors[type],
                emissive: colors[type],
                emissiveIntensity: 0.4,
                shininess: 100
            });

            const mesh = new THREE.Mesh(geometry, material);

            const angle = Math.random() * Math.PI * 2;
            const distance = 40 + Math.random() * 30;
            mesh.position.x = Math.cos(angle) * distance;
            mesh.position.z = Math.sin(angle) * distance;
            mesh.position.y = Math.random() * 4 - 2;

            const moveAngle = Math.random() * Math.PI * 2;
            const speed = 0.18 + Math.random() * 0.12;
            const velocity = new THREE.Vector3(
                Math.cos(moveAngle) * speed,
                0,
                Math.sin(moveAngle) * speed
            );

            const obstacle = {
                mesh: mesh,
                type: type,
                velocity: velocity
            };

            scene.add(mesh);
            obstacles.push(obstacle);
        }

        function updatePlayer(deltaTime) {
            if (currentState !== GameState.PLAYING) return;

            const speedFactor = Math.min(deltaTime * 60, 2);
            const moveSpeed = playerSpeed * speedFactor;

            if (keys['w'] || keys['arrowup']) {
                player.position.z -= moveSpeed;
            }
            if (keys['s'] || keys['arrowdown']) {
                player.position.z += moveSpeed;
            }
            if (keys['a'] || keys['arrowleft']) {
                player.position.x -= moveSpeed;
            }
            if (keys['d'] || keys['arrowright']) {
                player.position.x += moveSpeed;
            }

            const boundary = 85;
            player.position.x = Math.max(-boundary, Math.min(boundary, player.position.x));
            player.position.z = Math.max(-boundary, Math.min(boundary, player.position.z));

            const allObstacles = [...staticObstacles, ...boundaryObstacles];
            for (let i = 0; i < allObstacles.length; i++) {
                const obs = allObstacles[i];
                const dx = player.position.x - obs.position.x;
                const dz = player.position.z - obs.position.z;
                const distance = Math.sqrt(dx * dx + dz * dz);
                const minDistance = 1 + obs.userData.radius;

                if (distance < minDistance) {
                    const angle = Math.atan2(dz, dx);
                    player.position.x = obs.position.x + Math.cos(angle) * minDistance;
                    player.position.z = obs.position.z + Math.sin(angle) * minDistance;
                }
                
                updateObstacleOpacity(obs, distance);
            }

            player.rotation.x += 0.02 * speedFactor;
            player.rotation.y += 0.03 * speedFactor;
        }
        
        function updateObstacleOpacity(obstacle, distance) {
            const shouldBeTransparent = distance < (1.5 + obstacle.userData.radius);
            
            if (shouldBeTransparent !== obstacle.userData.isTransparent) {
                obstacle.userData.isTransparent = shouldBeTransparent;
                
                obstacle.traverse((child) => {
                    if (child.isMesh) {
                        if (shouldBeTransparent) {
                            child.userData.originalOpacity = child.material.opacity || 1;
                        }
                        child.material.transparent = true;
                        child.material.opacity = shouldBeTransparent ? 0.4 : child.userData.originalOpacity || 1;
                    }
                });
            }
        }

        function updateObstacles(deltaTime) {
            if (currentState !== GameState.PLAYING) return;

            const speedFactor = Math.min(deltaTime * 60, 2);

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.mesh.position.x += obs.velocity.x * speedFactor;
                obs.mesh.position.z += obs.velocity.z * speedFactor;
                obs.mesh.rotation.x += 0.05 * speedFactor;
                obs.mesh.rotation.y += 0.05 * speedFactor;

                const dx = obs.mesh.position.x - player.position.x;
                const dz = obs.mesh.position.z - player.position.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                if (dist < 1.7) {
                    handleCollision(obs.type);
                    scene.remove(obs.mesh);
                    obstacles.splice(i, 1);
                    continue;
                }

                if (Math.abs(obs.mesh.position.x) > 100 || Math.abs(obs.mesh.position.z) > 100) {
                    scene.remove(obs.mesh);
                    obstacles.splice(i, 1);
                }
            }
        }

        function handleCollision(type) {
            switch (type) {
                case 'red':
                    gameOver();
                    break;
                case 'green':
                    score += 10;
                    updateScore();
                    break;
                case 'white':
                    playerSpeed = normalSpeed * 0.4;
                    slowdownTimer = 180;
                    speedIndicator.textContent = '速度: 减速中...';
                    speedIndicator.style.color = '#88ccff';
                    break;
            }
        }

        function updateCamera() {
            camera.position.x = player.position.x;
            camera.position.z = player.position.z + 35;
            camera.lookAt(player.position.x, player.position.y, player.position.z);
        }

        function updateScore() {
            scoreValue.textContent = score;
        }

        let spawnTimer = 0;
        let difficultyTimer = 0;
        let spawnRate = 10;

        function animate(time) {
            requestAnimationFrame(animate);
            
            const deltaTime = lastTime ? (time - lastTime) / 1000 : 1/60;
            lastTime = time;
            const speedFactor = Math.min(deltaTime * 60, 2);

            updatePlayer(deltaTime);
            updateObstacles(deltaTime);
            updateCamera();

            if (currentState === GameState.PLAYING) {
                if (slowdownTimer > 0) {
                    slowdownTimer -= speedFactor;
                    if (slowdownTimer <= 0) {
                        slowdownTimer = 0;
                        playerSpeed = normalSpeed;
                        speedIndicator.textContent = '速度: 正常';
                        speedIndicator.style.color = '#333';
                    }
                }

                spawnTimer += speedFactor;
                if (spawnTimer >= spawnRate) {
                    createObstacle();
                    spawnTimer = 0;
                }

                difficultyTimer += speedFactor;
                if (difficultyTimer >= 600 && spawnRate > 20) {
                    spawnRate -= 5;
                    difficultyTimer = 0;
                }
            }

            clouds.forEach(cloud => {
                cloud.position.x += cloud.userData.speed * speedFactor;
                if (cloud.position.x > 200) {
                    cloud.position.x = -200;
                }
            });

            renderer.render(scene, camera);
        }

        function startGame() {
            for (let i = obstacles.length - 1; i >= 0; i--) {
                scene.remove(obstacles[i].mesh);
            }
            obstacles = [];

            for (let i = staticObstacles.length - 1; i >= 0; i--) {
                scene.remove(staticObstacles[i]);
            }
            staticObstacles = [];
            
            for (let i = boundaryObstacles.length - 1; i >= 0; i--) {
                scene.remove(boundaryObstacles[i]);
            }
            boundaryObstacles = [];
            
            for (let i = clouds.length - 1; i >= 0; i--) {
                scene.remove(clouds[i]);
            }
            clouds = [];
            
            createClouds();
            createStaticObstacles();

            player.position.set(0, 0, 0);
            score = 0;
            playerSpeed = normalSpeed;
            spawnRate = 60;
            spawnTimer = 0;
            difficultyTimer = 0;
            slowdownTimer = 0;

            updateScore();
            speedIndicator.textContent = '速度: 正常';
            speedIndicator.style.color = '#333';

            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            scorePanel.classList.remove('hidden');
            legend.classList.remove('hidden');

            currentState = GameState.PLAYING;
        }

        function gameOver() {
            currentState = GameState.GAME_OVER;
            finalScoreEl.textContent = score;
            gameOverScreen.classList.remove('hidden');
            scorePanel.classList.remove('hidden');
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
